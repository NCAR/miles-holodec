# Single-plane model — reproduces old manopt hyperopt exactly
# Architecture: Linknet + Xception (manopt best, May 2022)
# lr=2.46e-4, normalize=norm, full augmentation suite
# Used to verify data/model pipeline reproduces prior results before further experimentation

seed: 1000
save_loc: "/glade/derecho/scratch/schreck/holodec/single_plane_validate"

data:
    n_bins: 1000
    data_path: "/glade/p/cisl/aiml/ai4ess_hackathon/holodec/synthetic_holograms_500particle_gamma_4872x3248_training.nc"
    valid_data_path: "/glade/p/cisl/aiml/ai4ess_hackathon/holodec/synthetic_holograms_500particle_gamma_4872x3248_validation.nc"
    tile_size: 512
    step_size: 128
    lookahead: 0   # single-plane
    device: "cuda"  # wave prop on gpu — much faster, requires num_workers=0

transforms:
    training:
        RandomVerticalFlip:
            rate: 0.5
        RandomHorizontalFlip:
            rate: 0.5
        Normalize:
            mode: 'norm'
        GaussianBlur:
            rate: 1.0
            kernel_size: 1
            sigma: 2.1252219359742823
        GaussianNoise:
            rate: 1.0
            noise: 0.3258530643453389
        AdjustBrightness:
            rate: 1.0
            brightness_factor: 1.269735791766263
    validation:
        Normalize:
            mode: 'norm'
    inference:
        Normalize:
            mode: 'norm'

model:
    name: "linknet"
    encoder_name: "xception"
    encoder_weights: "imagenet"
    in_channels: 1
    classes: 1
    activation: "sigmoid"

loss:
    training_loss_mask: "focal-tyversky"
    validation_loss_mask: "dice"

trainer:
    mode: "none"
    train_batch_size: 16
    valid_batch_size: 16
    batches_per_epoch: 500
    valid_batches_per_epoch: 100
    start_epoch: 0
    epochs: 100
    amp: true
    grad_accum_every: 1
    thread_workers: 0
    valid_thread_workers: 0
    stopping_patience: 4
    use_scheduler: true
    scheduler:
        scheduler_type: plateau
        mode: min
        factor: 0.1
        patience: 5
        cooldown: 2
        min_lr: 1.0e-09
        verbose: true
        threshold: 0.001
    learning_rate: 0.00024575732726722595
    weight_decay: 0.0

pbs:
    conda: "holodec"
    job_name: "holo_val"
    nodes: 1
    ncpus: 4
    ngpus: 1
    mem: "128GB"
    walltime: "06:00:00"
    gpu_type: "a100"
    project: "NAML0001"
    queue: "casper"
