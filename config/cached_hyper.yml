log: True
save_path: "/glade/derecho/scratch/mhayman/miles-holodec/echo"

pbs:
  jobs: 10
  tasks_per_worker: 1
  gpus_per_node: 1
  bash: [
      # "source ~/.bashrc", 
      "module load conda",
      "conda activate holodec"
        ]
  batch:
    N: "echo-holo"
    l: ["select=1:ncpus=8:ngpus=1:mem=128GB", "walltime=12:00:00", "gpu_type=v100"]
    A: "NEOL0007" # HOLODEC allocation "NAIML0011"# "NEOL0007"
    q: "casper"
    o: "out"
    e: "out"

optuna:
  storage: "study.db"
  study_name: "holodec"
  storage_type: "nfs"
  objective: "/glade/u/home/mhayman/Python/miles-holodec/applications/trainer_unet.py"
  direction: "minimize"
  metric: "valid_loss"
  n_trials: 1000
  gpu: True
  sampler:
    type: "TPESampler"
    n_startup_trials: 100
  parameters:
    trainer:learning_rate:
      type: "loguniform"
      settings:
        name: "learning_rate"
        low: 5.0e-05
        high: 1.0e-02
    trainer:scheduler:threshold:
      type: "loguniform"
      settings:
        name: "threshold"
        low: 1.0e-05
        high: 1.0e-02
    model:name:
      type: "categorical"
      settings:
        name: "model_name"
        choices: ["unet", "unet++", "manet", "linknet", "fpn", "pspnet", "pan", "deeplabv3", "deeplabv3+"]
    model:encoder_name:
      type: "categorical"
      settings:
        name: "encoder_name"
        choices: ["resnet18", "resnet152", "densenet121", "xception", "efficientnet-b0", "mobilenet_v2", "dpn68", "vgg11"]
    training_data:plane_inc:
      type: "int"
      settings:
        name: "plane_inc"
        low: 1
        high: 7
    training_data:lookahead:
      type: "int"
      settings:
        name: "lookahead"
        low: 2
        high: 5
